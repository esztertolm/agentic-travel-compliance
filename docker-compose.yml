
services:
  app:
    build: .
    container_name: agentic_travel_compliance_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /app/chroma_db
      - /app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: